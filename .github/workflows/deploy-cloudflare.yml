name: Deploy Assets to Cloudflare R2

# NOTE: Frontend deployment is handled by deploy-pages.yml workflow
# This workflow only handles R2 asset uploads (manifests, WASM, models, etc.)
# Only runs on pushes to main branch (NOT on PRs or staging branch)
#
# Frontend URLs:
#   - Production: hyperscape.club (main branch)
#   - Staging: staging.hyperscape.club (staging branch)
#
# API URLs (Railway):
#   - Production: api.hyperscape.club
#   - Staging: staging-api.hyperscape.club

on:
  push:
    branches: [main]
    paths:
      - 'packages/server/world/assets/manifests/**'
      - 'assets/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      deploy_ref:
        description: 'Git ref (commit SHA or tag) to deploy/rollback'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: 50ad2052bbc6ca528d6993a689b419a4
  # Production uses hyperscape-assets bucket
  # Staging uses hyperscape-assets-staging bucket (create this in Cloudflare R2)
  R2_BUCKET_PRODUCTION: hyperscape-assets
  R2_BUCKET_STAGING: hyperscape-assets-staging

jobs:
  deploy-assets:
    name: Deploy Assets to R2 (${{ github.ref_name == 'staging' && 'staging' || 'production' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.deploy_ref || github.sha }}

      - name: Determine deployment target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "staging" ] || [ "${{ inputs.environment }}" = "staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "bucket=${{ env.R2_BUCKET_STAGING }}" >> $GITHUB_OUTPUT
            echo "🎭 Deploying to STAGING (staging-assets.hyperscape.club)"
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "bucket=${{ env.R2_BUCKET_PRODUCTION }}" >> $GITHUB_OUTPUT
            echo "🚀 Deploying to PRODUCTION (assets.hyperscape.club)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Configure R2 CORS
        run: |
          BUCKET="${{ steps.target.outputs.bucket }}"
          echo "🔧 Configuring CORS for R2 bucket: $BUCKET"

          # Create CORS configuration (wrangler R2 API format)
          cat > /tmp/cors-rules.json << 'EOF'
          {
            "rules": [
              {
                "allowed": {
                  "origins": [
                    "https://hyperscape.gg",
                    "https://www.hyperscape.gg",
                    "https://hyperbet.win",
                    "https://www.hyperbet.win",
                    "https://hyperscape.bet",
                    "https://www.hyperscape.bet",
                    "https://hyperscape-production.up.railway.app",
                    "https://*.hyperscape.pages.dev",
                    "https://*.hyperscape-betting.pages.dev",
                    "http://localhost:3333",
                    "http://localhost:5555"
                  ],
                  "methods": ["GET", "HEAD"],
                  "headers": ["*"]
                },
                "exposed": ["Content-Length", "Content-Type", "ETag"],
                "maxAge": 86400
              }
            ]
          }
          EOF

          wrangler r2 bucket cors set "$BUCKET" --file /tmp/cors-rules.json
          echo "✅ CORS configured for $BUCKET"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload manifests to R2
        run: |
          MANIFESTS_DIR="packages/server/world/assets/manifests"
          BUCKET="${{ steps.target.outputs.bucket }}"
          
          if [ ! -d "$MANIFESTS_DIR" ]; then
            echo "⚠️ Manifests directory not found, skipping"
            exit 0
          fi
          
          echo "📦 Uploading manifests to R2 bucket: $BUCKET"
          
          # Upload all JSON files recursively
          find "$MANIFESTS_DIR" -type f -name "*.json" | while read file; do
            rel_path="${file#$MANIFESTS_DIR/}"
            key="manifests/$rel_path"
            echo "  → $key"
            wrangler r2 object put "$BUCKET/$key" \
              --file="$file" \
              --content-type="application/json"
          done
          
          echo "✅ Manifests uploaded to R2"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload WASM and web assets to R2
        run: |
          ASSETS_DIR="assets"
          BUCKET="${{ steps.target.outputs.bucket }}"
          
          if [ ! -d "$ASSETS_DIR" ]; then
            echo "⚠️ Assets directory not found, skipping"
            exit 0
          fi
          
          echo "📦 Uploading assets to R2 bucket: $BUCKET"
          
          find "$ASSETS_DIR" -type f | while read file; do
            rel_path="${file#$ASSETS_DIR/}"
            key="$rel_path"
            
            # Determine content type
            case "$file" in
              *.wasm) content_type="application/wasm" ;;
              *.js) content_type="application/javascript" ;;
              *.json) content_type="application/json" ;;
              *.glb) content_type="model/gltf-binary" ;;
              *.gltf) content_type="model/gltf+json" ;;
              *.vrm) content_type="model/gltf-binary" ;;
              *.png) content_type="image/png" ;;
              *.jpg|*.jpeg) content_type="image/jpeg" ;;
              *.webp) content_type="image/webp" ;;
              *.mp3) content_type="audio/mpeg" ;;
              *.ogg) content_type="audio/ogg" ;;
              *) content_type="application/octet-stream" ;;
            esac
            
            echo "  → $key ($content_type)"
            wrangler r2 object put "$BUCKET/$key" \
              --file="$file" \
              --content-type="$content_type"
          done
          
          echo "✅ Assets uploaded to R2"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
