name: Deploy to Railway

on:
  push:
    branches:
      - main
      - staging
      - develop
      - dev
      - hackathon
    paths:
      - 'packages/shared/**'
      - 'packages/client/**'
      - 'packages/server/**'
      - 'packages/plugin-hyperscape/**'
      - 'package.json'
      - 'bun.lock'
      - 'nixpacks.toml'
      - 'railway.server.json'
      - 'Dockerfile.server'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev
      deploy_ref:
        description: 'Git ref (commit SHA or tag) to deploy/rollback'
        required: false
        type: string

# Railway environment IDs
# Production: hyperscape.gg
# Development: dev.hyperscape.gg (recommended)

jobs:
  deploy:
    name: Deploy to Railway (${{ (github.ref_name == 'staging' || github.ref_name == 'develop' || github.ref_name == 'dev' || github.ref_name == 'hackathon' || inputs.environment == 'dev') && 'dev' || 'prod' }})
    runs-on: ubuntu-latest
    environment: ${{ (github.ref_name == 'staging' || github.ref_name == 'develop' || github.ref_name == 'dev' || github.ref_name == 'hackathon' || inputs.environment == 'dev') && 'development' || 'production' }}
    env:
      # Railway identifiers live in repo variables so they can be updated
      # without another workflow change when the linked service drifts.
      RAILWAY_PROJECT_ID: e5f5ba11-0380-4d71-aa0b-343d89a58c0d
      RAILWAY_PRODUCTION_SERVICE_ID: ${{ vars.RAILWAY_PRODUCTION_SERVICE_ID || '330ea18e-b215-4cf9-9fe2-4bb09fc2ec63' }}
      RAILWAY_PRODUCTION_ENVIRONMENT_ID: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID || '194f3565-ba2f-4c98-87d2-85dfc3a5110b' }}
      # Development environment (configure these in GitHub repository variables)
      RAILWAY_DEV_SERVICE_ID: ${{ vars.RAILWAY_DEV_SERVICE_ID || vars.RAILWAY_STAGING_SERVICE_ID || '330ea18e-b215-4cf9-9fe2-4bb09fc2ec63' }}
      RAILWAY_DEV_ENVIRONMENT_ID: ${{ vars.RAILWAY_DEV_ENVIRONMENT_ID || vars.RAILWAY_STAGING_ENVIRONMENT_ID || '1caead9b-c664-4ab2-aae5-8e9e52753db1' }}
      # Backward-compatible fallback (legacy staging variable names)
      RAILWAY_STAGING_SERVICE_ID: ${{ vars.RAILWAY_STAGING_SERVICE_ID }}
      RAILWAY_STAGING_ENVIRONMENT_ID: ${{ vars.RAILWAY_STAGING_ENVIRONMENT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.deploy_ref || github.sha }}

      - name: Determine deployment target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "staging" ] || [ "${{ github.ref_name }}" = "develop" ] || [ "${{ github.ref_name }}" = "dev" ] || [ "${{ github.ref_name }}" = "hackathon" ] || [ "${{ inputs.environment }}" = "dev" ]; then
            service_id="${{ env.RAILWAY_DEV_SERVICE_ID }}"
            environment_id="${{ env.RAILWAY_DEV_ENVIRONMENT_ID }}"

            # Fallback to legacy staging variable names if dev variables are not configured yet
            if [ -z "$service_id" ]; then
              service_id="${{ env.RAILWAY_STAGING_SERVICE_ID }}"
            fi
            if [ -z "$environment_id" ]; then
              environment_id="${{ env.RAILWAY_STAGING_ENVIRONMENT_ID }}"
            fi

            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "service_id=$service_id" >> $GITHUB_OUTPUT
            echo "environment_id=$environment_id" >> $GITHUB_OUTPUT
            echo "🎭 Deploying to DEV (dev.hyperscape.gg)"
          else
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "service_id=${{ env.RAILWAY_PRODUCTION_SERVICE_ID }}" >> $GITHUB_OUTPUT
            echo "environment_id=${{ env.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" >> $GITHUB_OUTPUT
            echo "🚀 Deploying to PROD (hyperscape.gg)"
          fi

      - name: Validate dev configuration
        if: steps.target.outputs.environment == 'dev'
        run: |
          if [ -z "${{ steps.target.outputs.service_id }}" ] || [ -z "${{ steps.target.outputs.environment_id }}" ]; then
            echo "❌ Development environment not configured!"
            echo ""
            echo "To set up dev deployment:"
            echo "1. Create a new environment in Railway called 'development' (or keep your existing staging env)"
            echo "2. Add repository variables in GitHub:"
            echo "   - RAILWAY_DEV_SERVICE_ID"
            echo "   - RAILWAY_DEV_ENVIRONMENT_ID"
            echo "   (legacy fallback: RAILWAY_STAGING_SERVICE_ID / RAILWAY_STAGING_ENVIRONMENT_ID)"
            echo ""
            echo "Get these IDs from Railway dashboard or API."
            exit 1
          fi

      - name: Trigger Railway Deployment
        id: trigger
        run: |
          echo "📦 Triggering deployment to ${{ steps.target.outputs.environment }}..."
          RESPONSE=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"${{ steps.target.outputs.environment_id }}\", serviceId: \"${{ steps.target.outputs.service_id }}\") }"}')
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"serviceInstanceRedeploy":true'; then
            echo "triggered=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment triggered successfully"
          elif echo "$RESPONSE" | grep -q '"Not Authorized"'; then
            echo "triggered=false" >> $GITHUB_OUTPUT
            echo "::warning::Railway token is not authorized for the ${{ steps.target.outputs.environment }} deployment target; refresh the token or trigger the deployment manually in Railway."
            {
              echo "### Railway deployment skipped"
              echo ""
              echo "- Target: \`${{ steps.target.outputs.environment }}\`"
              echo "- Reason: Railway API returned \`Not Authorized\` for service \`${{ steps.target.outputs.service_id }}\` in environment \`${{ steps.target.outputs.environment_id }}\`."
              echo "- Action: refresh \`RAILWAY_TOKEN\` access for this Railway project or trigger the deployment manually in Railway."
              if [ "${{ steps.target.outputs.environment }}" = "prod" ]; then
                echo "- Production note: the public Railway service may remain stale or unavailable until a manual deployment succeeds."
              else
                echo "- Non-production note: Docker validation should be used as the branch gate until credentials are refreshed."
              fi
            } >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "triggered=false" >> $GITHUB_OUTPUT
            echo "❌ Failed to trigger deployment"
            exit 1
          fi

      - name: Wait for deployment to start
        if: steps.trigger.outputs.triggered == 'true'
        run: sleep 10

      - name: Check deployment status
        if: steps.trigger.outputs.triggered == 'true'
        run: |
          for i in {1..5}; do
            RESPONSE=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
              -d '{"query":"query { project(id: \"${{ env.RAILWAY_PROJECT_ID }}\") { services { edges { node { name serviceInstances { edges { node { latestDeployment { status } } } } } } } } }"}')
            STATUS=$(echo "$RESPONSE" | jq -r '.data.project.services.edges[] | select(.node.name=="hyperscape") | .node.serviceInstances.edges[0].node.latestDeployment.status')
            echo "Deployment status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Deployment succeeded"
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "⏳ Deployment still in progress (will complete in background)"
