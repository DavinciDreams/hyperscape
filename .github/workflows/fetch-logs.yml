name: Fetch PM2 Logs
on:
  push:
    branches: [ "fetch-logs" ]

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PM2 Logs
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VAST_HOST }}
          port: ${{ secrets.VAST_PORT }}
          username: root
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            export PATH="/root/.bun/bin:$PATH"
            echo "=== Streaming State ==="
            curl -s http://127.0.0.1:5555/api/streaming/state 2>&1 | head -c 2000
            echo ""
            echo "=== Health ==="
            curl -s http://127.0.0.1:5555/health 2>&1
            echo ""
            echo "=== Recent Agent/Scheduler Logs ==="
            cat /root/hyperscape/logs/duel-out.log | grep -iE "agent|scheduler|insufficient|spawn|eliza|bot|duel-bot|connect" | tail -n 100
            echo "=== Game Server Errors ==="
            cat /root/hyperscape/logs/duel-out.log | grep -iE "error|fail|crash|timeout" | tail -n 30
            echo "=== PM2 list ==="
            bunx pm2 list
