name: Fetch PM2 Logs
on:
  push:
    branches: [ "fetch-logs" ]

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PM2 Logs
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VAST_HOST }}
          port: ${{ secrets.VAST_PORT }}
          username: root
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            export PATH="/root/.bun/bin:$PATH"
            echo "=== hyperscape-duel logs ==="
            bunx pm2 logs hyperscape-duel --lines 5000 --nostream | grep -v "\\[rtmp-bridge\\]" | grep -v "\\[CDP\\]" | tail -n 500
            echo "=== PM2 list ==="
            bunx pm2 list
