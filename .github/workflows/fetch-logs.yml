name: Fetch PM2 Logs
on:
  push:
    branches: [ "fetch-logs" ]

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PM2 Logs
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VAST_HOST }}
          port: ${{ secrets.VAST_PORT }}
          username: root
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            export PATH="/root/.bun/bin:$PATH"
            cd /root/hyperscape
            echo "=== Diagnostic 1: Checking dist/index.js ==="
            ls -la packages/server/dist/ || echo "No dist folder in server!"
            echo "=== Diagnostic 2: Checking pm2 errors ==="
            cat /root/.pm2/logs/hyperscape-duel-error-0.log | tail -n 50 || echo "No error log"
            echo "=== Diagnostic 3: Manual start attempt ==="
            cd packages/server
            bun run src/index.ts || echo "Failed to start server directly"
