name: IDL Sync Check

on:
  push:
    branches: [main, staging, develop, hackathon]
    paths:
      - "packages/gold-betting-demo/anchor/**"
      - "packages/gold-betting-demo/app/src/idl/**"
  pull_request:
    branches: [main, staging, develop, hackathon]
    paths:
      - "packages/gold-betting-demo/anchor/**"
      - "packages/gold-betting-demo/app/src/idl/**"

jobs:
  idl-sync:
    name: Verify IDL Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check IDL consistency
        run: node scripts/sync-anchor-idl-to-app.mjs --check
