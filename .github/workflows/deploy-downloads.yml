name: Deploy Download Portal

on:
  push:
    branches: [main]
    paths:
      - "downloads/**"
      - ".github/workflows/deploy-downloads.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-download-portal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload portal artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: downloads

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
