name: Deploy Download Portal

on:
  push:
    branches: [main]
    paths:
      - "downloads/**"
      - ".github/workflows/deploy-downloads.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-download-portal
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Check portal content
        id: portal
        run: |
          if [ -d downloads ] && find downloads -mindepth 1 -print -quit | grep -q .; then
            echo "has_content=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_content=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Download portal skipped"
              echo ""
              echo "- No \`downloads/\` content is present on this ref."
              echo "- Add files under \`downloads/\` or publish a release to deploy the portal."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload portal artifact
        if: steps.portal.outputs.has_content == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: downloads

      - name: Deploy
        if: steps.portal.outputs.has_content == 'true'
        id: deploy
        uses: actions/deploy-pages@v4
