name: Deploy Client to Cloudflare Pages

# Deploys the web client to Cloudflare Pages.
# Production deploys on pushes to main; manual dispatch supports production or preview deploys.
#
# Frontend URLs:
#   - Production: custom domain(s) on the Cloudflare Pages project
#   - Preview: <commit>.hyperscape.pages.dev

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: 50ad2052bbc6ca528d6993a689b419a4

jobs:
  deploy-client:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.1.38

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client (includes shared + physx dependencies via turbo)
        run: bun run build:client
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          PUBLIC_PRIVY_APP_ID: ${{ secrets.PUBLIC_PRIVY_APP_ID || 'cmgk4zu56005kjj0bcaae0rei' }}
          PUBLIC_API_URL: https://hyperscape-production.up.railway.app
          PUBLIC_WS_URL: wss://hyperscape-production.up.railway.app/ws
          PUBLIC_CDN_URL: https://assets.hyperscape.club

      - name: Determine Pages deployment target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.environment }}" = "production" ]; then
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "label=production" >> "$GITHUB_OUTPUT"
          else
            SAFE_REF=$(echo "${{ github.ref_name }}" | tr '[:upper:]/_' '[:lower:]--' | tr -cd 'a-z0-9-' | cut -c1-40)
            if [ -z "$SAFE_REF" ]; then
              SAFE_REF="manual"
            fi

            echo "branch=preview-${SAFE_REF}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "label=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: packages/client
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s | tr -d '"' | cut -c1-100)
          bunx wrangler pages deploy dist \
            --project-name=hyperscape \
            --branch=${{ steps.target.outputs.branch }} \
            --commit-hash=${{ github.sha }} \
            --commit-message="$COMMIT_MSG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ steps.target.outputs.label }}" >> $GITHUB_STEP_SUMMARY
          echo "**Git ref:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Pages branch:** ${{ steps.target.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- Production: whichever custom domain is attached to the Cloudflare Pages project" >> $GITHUB_STEP_SUMMARY
          echo "- Preview: see Wrangler output for the generated preview URL" >> $GITHUB_STEP_SUMMARY
