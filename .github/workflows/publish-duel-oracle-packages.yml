name: Publish Duel Oracle Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@hyperscapeai"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.1.38

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: |
          bun run --cwd packages/duel-oracle-solana build
          bun run --cwd packages/duel-oracle-evm build

      - name: Publish Solana package
        run: npm publish
        working-directory: packages/duel-oracle-solana
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish EVM package
        run: npm publish
        working-directory: packages/duel-oracle-evm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
