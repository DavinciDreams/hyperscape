services:
  hyperscape:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "5555"
      USE_LOCAL_POSTGRES: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-hyperscape}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hyperscape}
      PUBLIC_CDN_URL: ${PUBLIC_CDN_URL:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:-}
      PUBLIC_PRIVY_APP_ID: ${PUBLIC_PRIVY_APP_ID:-}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_CODE: ${ADMIN_CODE:-}
      DEFAULT_GOBLINS_ENABLED: ${DEFAULT_GOBLINS_ENABLED:-false}
      HOSTILE_MOBS_ENABLED: ${HOSTILE_MOBS_ENABLED:-false}
      MOBS_ENABLED: ${MOBS_ENABLED:-false}
      ENABLE_MOBS: ${ENABLE_MOBS:-false}
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5555/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hyperscape}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hyperscape}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hyperscape}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hyperscape}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      S3_BUCKET_CONJURES: ${S3_BUCKET_CONJURES:-hyperscape-conjures}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET_CONJURES}"
        mc anonymous set download "local/$${S3_BUCKET_CONJURES}"

volumes:
  postgres-data:
  minio-data:
