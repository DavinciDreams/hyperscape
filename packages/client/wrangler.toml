# Cloudflare Pages Configuration for Hyperscape
# Project: hyperscape (attach hyperscape.club and/or hyperscape.gg as custom domains)
# Account: 50ad2052bbc6ca528d6993a689b419a4

name = "hyperscape"
compatibility_date = "2024-10-01"

# Static assets directory for Pages deployment
# This enables `wrangler deploy` to work for Pages projects
[assets]
directory = "./dist"

[env.production]
vars = { }

# ============================================================
# CLOUDFLARE PAGES BUILD CONFIGURATION
# ============================================================
# Configure in Dashboard: Settings → Builds & deployments
#
# Git integration:   disabled (deploy via GitHub Actions / Wrangler)
# Build command:     bun run build
# Build output dir:  dist
# Root directory:    packages/client
#
# ============================================================
# REQUIRED ENVIRONMENT VARIABLES
# ============================================================
# Set in Dashboard: Settings → Environment variables → Production
#
# Build Configuration (REQUIRED - prevents heap out of memory):
#   NODE_OPTIONS            - --max-old-space-size=4096
#
# App Configuration:
#   PUBLIC_PRIVY_APP_ID     - cmgk4zu56005kjj0bcaae0rei
#   PUBLIC_API_URL          - https://hyperscape-production.up.railway.app
#   PUBLIC_WS_URL           - wss://hyperscape-production.up.railway.app/ws
#   PUBLIC_CDN_URL          - https://assets.hyperscape.club
#   PUBLIC_APP_URL          - Optional. Leave unset to use the current browser origin.
#   PUBLIC_EMBED_ALLOWED_ORIGINS - Optional comma-separated iframe parent allowlist.
#
# Optional:
#   PUBLIC_ELIZAOS_URL      - ElizaOS API for AI dashboard
#   PUBLIC_ENABLE_FARCASTER - Enable Farcaster mini-app features
