<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Hyperscape Stream</title>
  <meta name="description" content="Hyperscape streaming capture page" />
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="referrer" content="same-origin" />
  <style>
    html,
    body,
    #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }
  </style>
  <script src="/env.js"></script>
</head>

<body>
  <div id="root"></div>
  <script>
    (() => {
      const isTruthyUrlFlag = (rawValue) =>
        ["1", "true", "yes", "on"].includes(
          String(rawValue || "").toLowerCase(),
        );

      void (async () => {
        const searchParams = new URLSearchParams(window.location.search);
        const isInternalCapture = isTruthyUrlFlag(
          searchParams.get("internalCapture"),
        );
        const isLoopbackHost = [
          "localhost",
          "127.0.0.1",
          "0.0.0.0",
          "::1",
        ].includes(window.location.hostname);
        const shouldResetLocalCaches = isInternalCapture || isLoopbackHost;
        const reloadMarker = "__hyperscape_stream_sw_reset__";
        let shouldReload = false;

        if (
          shouldResetLocalCaches &&
          "serviceWorker" in navigator
        ) {
          try {
            const registrations =
              await navigator.serviceWorker.getRegistrations();
            if (registrations.length > 0) {
              await Promise.all(
                registrations.map((registration) =>
                  registration.unregister(),
                ),
              );
              shouldReload = true;
              console.log(
                `[stream.html] Unregistered ${registrations.length} local service worker(s)`,
              );
            }
          } catch (error) {
            console.warn(
              "[stream.html] Failed to unregister service workers:",
              error,
            );
          }
        }

        if (shouldResetLocalCaches && "caches" in window) {
          try {
            const cacheKeys = await caches.keys();
            const localCacheKeys = cacheKeys.filter(
              (cacheKey) =>
                cacheKey.startsWith("workbox") ||
                cacheKey.startsWith("hyperscape"),
            );
            if (localCacheKeys.length > 0) {
              await Promise.all(
                localCacheKeys.map((cacheKey) => caches.delete(cacheKey)),
              );
              shouldReload = true;
              console.log(
                `[stream.html] Cleared ${localCacheKeys.length} local cache bucket(s)`,
              );
            }
          } catch (error) {
            console.warn("[stream.html] Failed to clear caches:", error);
          }
        }

        if (shouldReload && !sessionStorage.getItem(reloadMarker)) {
          sessionStorage.setItem(reloadMarker, "1");
          window.location.reload();
          return;
        }

        sessionStorage.removeItem(reloadMarker);
      })();
    })();
  </script>
  <script type="module" src="./stream.tsx"></script>
</body>

</html>
