services:
  # CDN - Local nginx server for serving static game assets
  cdn:
    build:
      context: ./docker/cdn
      dockerfile: Dockerfile
    container_name: hyperia-cdn
    ports:
      - "8080:8080"
    volumes:
      # Mount nginx config for immediate dev updates (no image rebuild required)
      - ./docker/cdn/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/cdn/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount server world assets directory - changes are live-updated
      - ${HYPERIA_ASSETS_DIR:-./world/assets}:/usr/share/nginx/html/assets:ro
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # PostgreSQL - Local development database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hyperia-postgres
    ports:
      - "${POSTGRES_PORT:-5488}:5432"
    environment:
      POSTGRES_USER: hyperia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hyperia_dev_password}
      POSTGRES_DB: hyperia
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperia"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres-data:
