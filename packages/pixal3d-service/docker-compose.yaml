services:
  pixal3d:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyperscape/pixal3d-service:local
    restart: unless-stopped
    gpus: all
    shm_size: 16gb
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
      GRADIO_SHARE: ${GRADIO_SHARE:-0}
      LOW_VRAM: ${LOW_VRAM:-1}
      ATTN_BACKEND: ${ATTN_BACKEND:-flash_attn}
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
    ports:
      - "${PIXAL3D_PORT:-7860}:7860"
    volumes:
      - pixal3d-hf-cache:/models/huggingface
      - pixal3d-torch-cache:/models/torch
      - pixal3d-tmp:/opt/pixal3d/tmp
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:7860/gradio_api/info | grep -q generate_3d"
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

volumes:
  pixal3d-hf-cache:
  pixal3d-torch-cache:
  pixal3d-tmp:
